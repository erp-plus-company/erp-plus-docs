name: Documentation CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  validate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install mkdocs
          pip install mkdocs-material

      - name: Build Documentation
        run: |
          mkdocs build --strict
