site_name: ERP Plus Documentation
site_description: Modular ERP Platform Documentation
site_author: ERP Plus Company

repo_name: erp-plus-company/erp-plus-docs
repo_url: https://github.com/erp-plus-company/erp-plus-docs

site_url: https://erp-plus-company.github.io/erp-plus-docs/

theme:
  name: material

  logo: assets/images/logo.jpg
  favicon: assets/images/logo.jpg

  font:
    text: Inter
    code: JetBrains Mono

  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Dark Mode

    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Light Mode

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.instant

    - navigation.top

    - search.highlight

    - toc.follow

    - content.code.copy

  extra_css:
    - assets/stylesheets/extra.css

  extra:
    social:
      - icon: fontawesome/brands/github
        link: https://github.com/erp-plus-company

  copyright: >
    Copyright © ERP Plus Company

nav:
  - Home: index.md

  - Organization:
      - Overview: organization/index.md
      - Platform Structure: organization/platform-structure.md
      - Repositories: organization/repositories.md
      - Ownership Model: organization/ownership-model.md
      - Visibility Model: organization/visibility-model.md

  - System:
      - Overview: system/index.md
      - Blueprint: system/blueprint.md
      - Data Flow: system/data-flow.md
      - Engine Contracts: system/engine-contracts.md
      - Roles and Access: system/roles-and-access.md
      - Governance and Evolution: system/governance-and-evolution.md
      - Observability and Operational Model: system/observability-and-operational-model.md

  - Architecture:
      - Reading Guide: architecture/index.md
      - Modular Monolith: architecture/modular-monolith.md
      - Engines Overview: architecture/engines.md
      - Multi-tenancy: architecture/multitenancy.md

  - Engines:
      - Contribution Guide: engines/contribution-guide.md
      - Erp Core: engines/erp_core/index.md
      - Erp Accounts: engines/erp_accounts/index.md
      - Erp Users: engines/erp_users/index.md
      - Erp Workers: engines/erp_workers/index.md
      - Erp Inventory: engines/erp_inventory/index.md

  - Getting Started:
      - Introduction: getting-started/index.md
      - Installation: getting-started/installation.md
      - First Run: getting-started/first-run.md

  - Development:
      - Workflow: development/workflow.md
      - Standards: development/standards.md
      - Testing: development/testing.md
      - PR Standards: development/pr-standard.md
      - Feature Lifecycle: development/feature-lifecycle.md

  - Operations:
      - CI/CD: deployment/ci-cd.md
      - Environments: deployment/environments.md
      - Kamal: deployment/kamal.md
      - Rollback: deployment/rollback.md
      - Security Policies: security/policies.md
      - Secrets Management: security/secrets.md
      - Vulnerability Handling: security/vulnerabilities.md

  - Decisions:
      - ADR 0001 Modular Monolith: decisions/adr-0001-modular-monolith.md
      - ADR 0002 Kamal: decisions/adr-0002-kamal.md
      - ADR 0003 Engines: decisions/adr-0003-engines.md

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - codehilite
